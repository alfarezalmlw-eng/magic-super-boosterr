name: Build APK from Google Drive

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Biar bisa di-run manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Setup environment
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Step 2: Download ZIP dari Google Drive
      - name: Download project from Google Drive
        run: |
          # Install gdown (tool download dari Google Drive)
          pip install gdown
          
          # ID file dari link kamu
          FILE_ID="1DEqIDZXqw7L9bGyA4iBlAQXVJTpww9HT"
          
          # Download file
          gdown "https://drive.google.com/uc?id=$FILE_ID" -O project.zip
          
          # Ekstrak ZIP
          unzip project.zip
          
          # Kalau hasil ekstrak ada di folder 'magic-super-booster', pindahkan ke root
          if [ -d "magic-super-booster" ]; then
            mv magic-super-booster/* . || true
            rm -rf magic-super-booster
          fi

      # Step 3: Build APK
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # Step 4: Upload hasil APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk