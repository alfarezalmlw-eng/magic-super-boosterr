name: Build APK from Google Drive

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download project from Google Drive
        run: |
          pip install gdown
          FILE_ID="1DEqIDZXqw7L9bGyA4iBlAQXVJTpww9HT"
          gdown "https://drive.google.com/uc?id=$FILE_ID" -O project.zip
          unzip project.zip
          if [ -d "magic-super-booster" ]; then
            mv magic-super-booster/* . || true
            rm -rf magic-super-booster
          fi

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
